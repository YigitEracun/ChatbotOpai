<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Asistan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="https://cdn.openai.com/agentkit/chatkit-component/v0/chatkit-component.esm.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0f14;
      --surface: #161921;
      --border:  #252a36;
      --accent:  #6c8ef5;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --font:    'DM Sans', sans-serif;
    }
    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6c8ef5, #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }
    header h1 { font-size: 15px; font-weight: 600; }
    header p  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #34d399;
      box-shadow: 0 0 6px #34d39977;
      margin-left: auto;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    #chatkit-container { flex: 1; overflow: hidden; }
    openai-chatkit { width: 100%; height: 100%; display: block; }
    #loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #error {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 24px;
    }
    #error span { font-size: 28px; }
  </style>
</head>
<body>
  <header>
    <div class="avatar">✦</div>
    <div>
      <h1>AI Asistan</h1>
      <p>Size nasıl yardımcı olabilirim?</p>
    </div>
    <div class="dot"></div>
  </header>
  <div id="loading">
    <div class="spinner"></div>
    <span>Bağlanıyor...</span>
  </div>
  <div id="error">
    <span>⚠️</span>
    <p>Bağlantı kurulamadı.<br>Lütfen sayfayı yenileyin.</p>
  </div>
  <div id="chatkit-container" style="display:none">
    <openai-chatkit id="chatkit"></openai-chatkit>
  </div>
  <script>
    async function init() {
      try {
        const res = await fetch('/api/chatkit/session', { method: 'POST' });
        if (!res.ok) throw new Error('Session alınamadı');
        const { client_secret } = await res.json();
        const chatkit = document.getElementById('chatkit');
        chatkit.setAttribute('client-secret', client_secret);
        chatkit.setAttribute('theme', JSON.stringify({
          colors: {
            primary: '#6c8ef5',
            background: '#0d0f14',
            surface: '#161921',
            text: '#e8eaf0',
            border: '#252a36',
          },
          fontFamily: "'DM Sans', sans-serif",
          borderRadius: '12px',
        }));
        document.getElementById('loading').style.display = 'none';
        document.getElementById('chatkit-container').style.display = 'block';
      } catch (err) {
        console.error(err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'flex';
      }
    }
    init();
  </script>
</body>
</html>
