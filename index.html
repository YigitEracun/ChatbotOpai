<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Asistan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161921;
      --border:    #252a36;
      --accent:    #6c8ef5;
      --accent2:   #a78bfa;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --user-bg:   #1e2535;
      --ai-bg:     #161921;
      --radius:    14px;
      --font:      'DM Sans', sans-serif;
      --mono:      'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      flex-shrink: 0;
    }

    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    header p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #34d399;
      margin-left: auto;
      box-shadow: 0 0 6px #34d39977;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      animation: fadeUp 0.25s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
    }

    .msg.user .msg-avatar {
      background: var(--user-bg);
      border: 1px solid var(--border);
    }

    .msg.ai .msg-avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      letter-spacing: 0.1px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }

    .msg.ai .bubble {
      background: var(--ai-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    /* Typing indicator */
    .typing .bubble {
      padding: 14px 18px;
    }

    .typing-dots {
      display: flex; gap: 5px; align-items: center;
    }

    .typing-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.2s infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    .welcome .icon {
      font-size: 32px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .welcome h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .welcome p { font-size: 13px; line-height: 1.6; }

    /* ── Input ── */
    footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px #6c8ef520;
    }

    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      line-height: 1.5;
      max-height: 120px;
      min-height: 22px;
    }

    textarea::placeholder { color: var(--muted); }

    #send-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.93); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #send-btn svg { width: 16px; height: 16px; }

    .hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div class="avatar">✦</div>
    <div>
      <h1>AI Asistan</h1>
      <p>Size nasıl yardımcı olabilirim?</p>
    </div>
    <div class="status-dot"></div>
  </header>

  <div id="messages">
    <div class="welcome">
      <div class="icon">✦</div>
      <h2>Merhaba! 👋</h2>
      <p>Sorularınızı yanıtlamak için buradayım.<br>Aşağıya yazarak başlayabilirsiniz.</p>
    </div>
  </div>

  <footer>
    <div class="input-wrap">
      <textarea
        id="input"
        placeholder="Mesajınızı yazın..."
        rows="1"
      ></textarea>
      <button id="send-btn" title="Gönder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="hint">Enter ile gönder · Shift+Enter yeni satır</p>
  </footer>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl    = document.getElementById('input');
    const sendBtn    = document.getElementById('send-btn');

    let previousResponseId = null;
    let isLoading = false;

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });

    // Send on Enter (Shift+Enter = new line)
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });

    sendBtn.addEventListener('click', handleSend);

    function handleSend() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      // Remove welcome message
      const welcome = messagesEl.querySelector('.welcome');
      if (welcome) welcome.remove();

      appendMsg('user', text);
      inputEl.value = '';
      inputEl.style.height = 'auto';

      const typing = appendTyping();
      setLoading(true);

      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, previousResponseId }),
      })
      .then(r => r.json())
      .then(data => {
        typing.remove();
        if (data.error) {
          appendMsg('ai', '⚠️ ' + data.error);
        } else {
          previousResponseId = data.id;
          appendMsg('ai', data.text);
        }
      })
      .catch(() => {
        typing.remove();
        appendMsg('ai', '⚠️ Bağlantı hatası oluştu, lütfen tekrar deneyin.');
      })
      .finally(() => setLoading(false));
    }

    function appendMsg(role, text) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + role;

      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.textContent = role === 'user' ? '👤' : '✦';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      wrap.appendChild(av);
      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function appendTyping() {
      const wrap = document.createElement('div');
      wrap.className = 'msg ai typing';
      wrap.innerHTML = `
        <div class="msg-avatar">✦</div>
        <div class="bubble">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return wrap;
    }

    function setLoading(val) {
      isLoading = val;
      sendBtn.disabled = val;
    }
  </script>

</body>
</html>
