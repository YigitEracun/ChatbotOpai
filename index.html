<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Asistan</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: sans-serif;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .chat-window {
      width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: linear-gradient(135deg, #1a5fa8, #0e8a7c);
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .chat-header h2 { color: #fff; font-size: 15px; font-weight: 700; }
    .chat-header p  { color: rgba(255,255,255,0.7); font-size: 12px; }
    .online { display: flex; align-items: center; gap: 5px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: #dce2ed; border-radius: 4px; }

    .msg { max-width: 75%; padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.5; }
    .bot { background: #f0f4f8; color: #1e2a3b; border-bottom-left-radius: 4px; align-self: flex-start; }
    .user { background: #1a5fa8; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }

    .typing { display: flex; gap: 5px; padding: 14px 18px; align-self: flex-start; }
    .typing span {
      width: 7px; height: 7px; border-radius: 50%; background: #aab;
      animation: bounce 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    /* Input */
    .chat-input {
      padding: 16px;
      border-top: 1px solid #eef1f6;
      display: flex;
      gap: 10px;
    }
    .chat-input input {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid #dce2ed;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      font-family: sans-serif;
    }
    .chat-input input:focus { border-color: #1a5fa8; }
    .send-btn {
      width: 42px; height: 42px;
      background: #1a5fa8;
      border: none; border-radius: 50%;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .send-btn:hover { background: #0e8a7c; }
    .send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<div class="chat-window">
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div>
      <h2>AI Asistan</h2>
      <div class="online"><span class="dot"></span><p>Çevrimiçi</p></div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="msg bot">Merhaba! Size nasıl yardımcı olabilirim? 👋</div>
  </div>

  <div class="chat-input">
    <input id="input" type="text" placeholder="Mesajınızı yazın…" />
    <button class="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>
</div>

<script>
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'msg bot typing';
    div.id = 'typing';
    div.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';

    addMsg(text, 'user');
    showTyping();

    try {
      const res = await fetch('/api/chatkit/session', { method: 'POST' });
      const data = await res.json();
      removeTyping();
      addMsg(data.reply || 'Yanıt alınamadı.', 'bot');
    } catch {
      removeTyping();
      addMsg('Bağlantı hatası. Lütfen tekrar deneyin.', 'bot');
    }
  }
</script>

</body>
</html>
